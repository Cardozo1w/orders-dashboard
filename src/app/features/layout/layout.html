<div class="min-h-screen bg-gradient-to-b from-slate-50 to-slate-100 flex">
  <!-- SIDEBAR DESKTOP -->
  <aside class="hidden xl:flex flex-col w-64 bg-white shadow-lg p-6 gap-4">
    <h2 class="text-xl font-semibold text-slate-800 mb-6">
      Orders<span class="text-blue-600">App</span>
    </h2>

    <button class="flex items-center gap-3 px-4 py-2 rounded-lg hover:bg-blue-50 transition" (click)="navigate('home')">
      🏠 Dashboard
    </button>

    <button class="flex items-center gap-3 px-4 py-2 rounded-lg hover:bg-blue-50 transition"
      (click)="navigate('products')">
      🔍 Productos
    </button>

    @if (isAlmacenista()) {
    <button class="flex items-center gap-3 px-4 py-2 rounded-lg hover:bg-blue-50 transition"
      (click)="navigate('orders')">
      🛒 Pedidos
    </button>
    }
  </aside>

  <!-- CONTENIDO -->
  <div class="flex-1 flex flex-col">
    <!-- TOPBAR -->
    <header class="bg-white shadow-sm px-6 py-4 flex items-center gap-4">
      <!-- HAMBURGER -->
      <button class="lg:hidden text-xl" (click)="toggleMenu()">☰</button>

      <span class="font-semibold text-slate-700"> Orders App </span>
    </header>

    <main class="flex-1 p-6 overflow-y-auto pb-20">
      <router-outlet></router-outlet>
    </main>
  </div>
</div>

<!-- BOTTOM NAV (MOBILE / TABLET, incluye iPad Pro) -->
<nav class="fixed bottom-0 left-0 right-0 bg-white border-t border-slate-200 shadow-inner z-40 xl:hidden">
  <div class="max-w-3xl mx-auto flex justify-around items-center py-2">
    <button class="flex flex-col items-center text-xs text-slate-600" (click)="navigate('home')">
      <span class="text-lg">🏠</span>
      <span>Inicio</span>
    </button>

    <button class="flex flex-col items-center text-xs text-slate-600" (click)="navigate('products')">
      <span class="text-lg">🔍</span>
      <span>Productos</span>
    </button>

    @if (isAlmacenista()) {
    <button class="flex flex-col items-center text-xs text-slate-600" (click)="navigate('orders')">
      <span class="text-lg">🛒</span>
      <span>Pedidos</span>
    </button>
    }
  </div>
</nav>
